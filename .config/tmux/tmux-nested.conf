# ==========================================
# Konfiguracja Tmux-in-Tmux (Nested Tmux)
# ==========================================
# 
# Ta konfiguracja umożliwia przełączanie "aktywności" zewnętrznego tmuxa za pomocą klawisza Ctrl+n.
# Gdy zewnętrzny tmux jest wyłączony (OFF):
# 1. Jego klawisz prefix zostaje wyłączony.
# 2. Wszystkie skróty klawiszowe są przekazywane bezpośrednio do wewnętrznego tmuxa.
# 3. Pasek statusu zmienia wygląd (kolor), sygnalizując stan nieaktywny.
#
# Po ponownym naciśnięciu Ctrl+n zewnętrzny tmux wraca do normalnego stanu (ON).

# ------------------------------------------
# 1. Definicja zachowania po wyłączeniu (Ctrl+n w stanie aktywnym)
# ------------------------------------------
bind -T root C-n \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=colour245,bg=colour238" \;\
    set window-status-current-style "fg=colour245,bg=colour238" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

# ------------------------------------------
# 2. Definicja powrotu do normy (Ctrl+p w stanie nieaktywnym)
# ------------------------------------------
bind -T off C-p \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set -u window-status-current-style \;\
    refresh-client -S
